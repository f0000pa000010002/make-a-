<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Secure App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>Secure<span>Gate</span></h1>
        </div>
        <div class="nav-links">
            <span class="user-greeting">Welcome, <span id="userName">User</span></span>
            <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
    </nav>
    
    <main class="main-content">
        <div class="dashboard">
            <div class="dashboard-header">
                <h2>Overview</h2>
                <div class="date-display">
                    <span id="currentDate"></span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #4F46E5;">●</div>
                    <div class="stat-info">
                        <h3>Active Sessions</h3>
                        <p class="stat-value" id="activeSessions">3</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #DB0A76;">●</div>
                    <div class="stat-info">
                        <h3>Security Score</h3>
                        <p class="stat-value" id="securityScore">92</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #10B981;">●</div>
                    <div class="stat-info">
                        <h3>API Calls</h3>
                        <p class="stat-value" id="apiCalls">1,248</p>
                    </div>
                </div>
            </div>

            <div class="content-grid">
                <div class="main-panel">
                    <div class="panel-header">
                        <h3>Recent Activity</h3>
                        <button class="btn-small">View All</button>
                    </div>
                    <div class="activity-list">
                        <div class="activity-item">
                            <div class="activity-icon" style="background: #F59E0B;">S</div>
                            <div class="activity-details">
                                <span class="activity-title">System Backup</span>
                                <span class="activity-time">2 hours ago</span>
                            </div>
                        </div>
                        <div class="activity-item">
                            <div class="activity-icon" style="background: #3B82F6;">L</div>
                            <div class="activity-details">
                                <span class="activity-title">Login from New Device</span>
                                <span class="activity-time">5 hours ago</span>
                            </div>
                        </div>
                        <div class="activity-item">
                            <div class="activity-icon" style="background: #EF4444;">W</div>
                            <div class="activity-details">
                                <span class="activity-title">Security Alert Cleared</span>
                                <span class="activity-time">1 day ago</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="side-panel">
                    <div class="panel-header">
                        <h3>Quick Access</h3>
                    </div>
                    <div class="quick-links">
                        <a href="#" class="quick-link">
                            <div class="link-icon">📁</div>
                            <span>Documents</span>
                        </a>
                        <a href="#" class="quick-link">
                            <div class="link-icon">⚙️</div>
                            <span>Settings</span>
                        </a>
                        <a href="#" class="quick-link">
                            <div class="link-icon">👥</div>
                            <span>Team</span>
                        </a>
                        <a href="#" class="quick-link">
                            <div class="link-icon">📊</div>
                            <span>Analytics</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
